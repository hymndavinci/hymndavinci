name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]  # Update tiap hari
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Plugin yang mau diaktifkan
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_achievements: yes
